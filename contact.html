<head>

</head>
<body>
  <header>
    <div class="container">
      <nav>
        <a class="brand" href="index.html">Sherlyn Muthoni</a>
        <div>
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="services.html">Services</a>
          <a href="contact.html">Contact</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div>
        <h1>Contact Me</h1>
        <p>If you'd like to discuss a website project, computing lessons, or a collaboration, please send a message.</p>
        <p>Phone: 0768359919<br />Email: sherlynmuthoni@gamil.com</p>
      </div>
      <div>
        <img src="images/photo2.svg" alt="Contact illustration" />
      </div>
    </section>

    <section class="section">
      <div class="contact-card">
        <h3>Send a message</h3>
        <form id="contact-form" action="submit_contact.php" method="post" novalidate>
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />
          <small class="error-message" id="name-error"></small>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Your email" required />
          <small class="error-message" id="email-error"></small>

          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="Your phone number" />

          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="How can I help you?" required></textarea>
          <small class="error-message" id="message-error"></small>

          <button type="submit">Send message</button>
          <p class="form-message" id="form-message"></p>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>© 2026 Sherlyn Muthoni</p>
    </div>
  </footer>
  <script src="script.js"></script>
