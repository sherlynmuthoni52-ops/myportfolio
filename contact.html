<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Sherlyn Muthoni</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <a class="brand" href="index.html">Sherlyn Muthoni</a>
        <div>
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="services.html">Services</a>
          <a href="contact.html">Contact</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div>
        <h1>Contact Me</h1>
        <p>If you'd like to discuss a website project, computing lessons, or a collaboration, please send a message.</p>
        <p>Phone: 0768359919<br />Email: sherlynmuthoni@gamil.com</p>
      </div>
      <div>
        <img src="images/photo2.svg" alt="Contact illustration" />
      </div>
    </section>

    <section class="section">
      <div class="contact-card">
        <h3>Send a message</h3>
        <form action="#" method="post">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Your email" required />

          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="Your phone number" />

          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="How can I help you?" required></textarea>

          <button type="submit">Send message</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>© 2026 Sherlyn Muthoni</p>
    </div>
  </footer>
</body>
</html>
